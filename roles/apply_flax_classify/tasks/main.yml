---
# Fail-fast on missing vault wiring.
- name: Assert flax-classify password is wired
  ansible.builtin.assert:
    that:
      - apply_flax_classify_db_password | length > 0
    fail_msg: |
      apply_flax_classify_db_password is empty. Check both:
        (1) inventories/<site>/group_vars/all/vault.yml has vault_flax_classify_db_password
        (2) inventories/<site>/group_vars/all/vars.yml wires it to apply_flax_classify_db_password
  no_log: true

- name: Create /etc/flax/flax-classify
  become: true
  ansible.builtin.file:
    path: /etc/flax/flax-classify
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Remove stale pre-rename triage DNS file (renamed to flax-triage-devices)
  become: true
  ansible.builtin.file:
    path: /etc/dnsmasq.hosts/flax-devices
    state: absent

- name: Deploy flax-classify.env
  become: true
  ansible.builtin.template:
    src: flax-classify.env.j2
    dest: /etc/flax/flax-classify/flax-classify.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart flax-classify

- name: Deploy flax-classify.service
  become: true
  ansible.builtin.template:
    src: flax-classify.service.j2
    dest: /etc/systemd/system/flax-classify.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart flax-classify

# bang-fiesta hosts: external zone allow rule for the healthz port
# (matches the precedent set by apply_flax_observe — see project memory
# "bang-* host-mode docker services need explicit firewalld port").
# Use firewall-cmd directly: bang hosts don't have the python firewall
# library that ansible.posix.firewalld requires.
- name: Check if flax-classify /healthz port is already open in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --query-port={{ apply_flax_classify_healthz_port }}/tcp"
  register: apply_flax_classify_port_query
  changed_when: false
  failed_when: false

- name: Open flax-classify /healthz port in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --add-port={{ apply_flax_classify_healthz_port }}/tcp"
  when: apply_flax_classify_port_query.rc != 0
  changed_when: true
  notify: Reload firewalld

- name: Open flax-classify /healthz port in zone external (runtime)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --zone=external --add-port={{ apply_flax_classify_healthz_port }}/tcp"
  when: apply_flax_classify_port_query.rc != 0
  changed_when: true

- name: Enable flax-classify (start happens via VIP-gate handler)
  become: true
  ansible.builtin.systemd:
    name: flax-classify.service
    enabled: false      # VIP-exclusive — see project_keepalived_failback_trap
    daemon_reload: true

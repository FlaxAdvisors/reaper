---
- name: Check if flax-switch-sense /healthz port is already open in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --query-port={{ apply_flax_switch_sense_healthz_port }}/tcp"
  register: apply_flax_switch_sense_port_query
  changed_when: false
  failed_when: false

- name: Open flax-switch-sense /healthz port in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --add-port={{ apply_flax_switch_sense_healthz_port }}/tcp"
  when: apply_flax_switch_sense_port_query.rc != 0
  changed_when: true
  notify: Reload firewalld

- name: Open flax-switch-sense /healthz port in zone external (runtime)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --zone=external --add-port={{ apply_flax_switch_sense_healthz_port }}/tcp"
  when: apply_flax_switch_sense_port_query.rc != 0
  changed_when: true

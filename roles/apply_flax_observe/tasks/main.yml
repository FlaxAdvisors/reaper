---
- name: Assert flax-observe DB password is wired
  ansible.builtin.assert:
    that:
      - apply_flax_observe_db_password | length > 0
    fail_msg: |
      apply_flax_observe_db_password is empty. Wire it from the vault:
        all/vars.yml: apply_flax_observe_db_password:
                        "{{ vault_flax_stack_db_passwords.flax_observe }}"
  no_log: true

- name: Apply systemd unit + env
  ansible.builtin.import_tasks: systemd.yml

- name: Apply firewalld rule
  ansible.builtin.import_tasks: firewall.yml

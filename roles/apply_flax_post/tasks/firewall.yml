---
# Viewer HTTP (web_port) + the nginx TLS front (https_port).
- name: Check if flax-post ports are already open in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --query-port={{ item }}/tcp"
  register: apply_flax_post_port_query
  changed_when: false
  failed_when: false
  loop:
    - "{{ apply_flax_post_web_port }}"
    - "{{ apply_flax_post_https_port }}"

- name: Open flax-post ports in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --add-port={{ item.item }}/tcp"
  when: item.rc != 0
  changed_when: true
  notify: Reload firewalld
  loop: "{{ apply_flax_post_port_query.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Open flax-post ports in zone external (runtime)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --zone=external --add-port={{ item.item }}/tcp"
  when: item.rc != 0
  changed_when: true
  loop: "{{ apply_flax_post_port_query.results }}"
  loop_control:
    label: "{{ item.item }}"

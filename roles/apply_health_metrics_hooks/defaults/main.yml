---
apply_health_metrics_hooks_install_dir: /opt/flax/sbin/health_hooks
apply_health_metrics_hooks_textfile_dir: /var/lib/node_exporter/textfile_collector

# Mapping of hook script -> timer interval (used by the templated systemd timers).
apply_health_metrics_hooks_timers:
  - { name: chk_services_metric, interval: 30s }
  - { name: dnsmasq_leases, interval: 60s }
  - { name: coredump_count, interval: 60s }
  - { name: firewalld_zones, interval: 300s }

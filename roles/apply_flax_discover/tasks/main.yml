---
# Fail-fast on missing vault wiring.
- name: Assert flax-discover password is wired
  ansible.builtin.assert:
    that:
      - apply_flax_discover_db_password | length > 0
    fail_msg: |
      apply_flax_discover_db_password is empty. Check both:
        (1) inventories/<site>/group_vars/all/vault.yml has vault_flax_discover_db_password
        (2) inventories/<site>/group_vars/all/vars.yml wires it to apply_flax_discover_db_password
  no_log: true

- name: Create /etc/flax/flax-discover
  become: true
  ansible.builtin.file:
    path: /etc/flax/flax-discover
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy flax-discover.env
  become: true
  ansible.builtin.template:
    src: flax-discover.env.j2
    dest: /etc/flax/flax-discover/flax-discover.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart flax-discover

- name: Deploy flax-discover.service
  become: true
  ansible.builtin.template:
    src: flax-discover.service.j2
    dest: /etc/systemd/system/flax-discover.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart flax-discover

# bang-fiesta hosts: external zone allow rule for the healthz port
# (matches the precedent set by apply_flax_observe — see project memory
# "bang-* host-mode docker services need explicit firewalld port").
# Use firewall-cmd directly: bang hosts don't have the python firewall
# library that ansible.posix.firewalld requires.
- name: Check if flax-discover /healthz port is already open in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --query-port={{ apply_flax_discover_healthz_port }}/tcp"
  register: apply_flax_discover_port_query
  changed_when: false
  failed_when: false

- name: Open flax-discover /healthz port in zone external (permanent)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --permanent --zone=external --add-port={{ apply_flax_discover_healthz_port }}/tcp"
  when: apply_flax_discover_port_query.rc != 0
  changed_when: true
  notify: Reload firewalld

- name: Open flax-discover /healthz port in zone external (runtime)
  become: true
  ansible.builtin.command:
    cmd: "firewall-cmd --zone=external --add-port={{ apply_flax_discover_healthz_port }}/tcp"
  when: apply_flax_discover_port_query.rc != 0
  changed_when: true

# Stage the per-site family-map (family -> match-spec rules). Same per-site
# config convention as apply_lease_agent's "Deploy family-map files" task:
# config_output_dir/site_name/services/family-map/*.txt -> /etc/flax/family-map/.
# The flax-discover container mounts this dir read-only (--family-map-dir).
- name: Ensure /etc/flax/family-map exists
  become: true
  ansible.builtin.file:
    path: /etc/flax/family-map
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy family-map files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/flax/family-map/{{ item | basename }}"
    owner: root
    group: root
    mode: "0644"
  with_fileglob:
    - "{{ config_output_dir }}/{{ site_name }}/services/family-map/*.txt"
  notify: Restart flax-discover

- name: Enable flax-discover (start happens via VIP-gate handler)
  become: true
  ansible.builtin.systemd:
    name: flax-discover.service
    enabled: false      # VIP-exclusive — see project_keepalived_failback_trap
    daemon_reload: true

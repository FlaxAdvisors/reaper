---
ansible_connection: ansible.builtin.ssh
ansible_user: flax
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no
  -o UserKnownHostsFile=/dev/null
device_role: collect_jumphost

# Eindhoven has a single WAN uplink (wlan0); the dual-WAN failover
# daemon's primary/backup assertion would fail. Run only the wlan0
# self-recovery watchdog from the jumphost_wan_failover role.
jumphost_wan_failover_wan_failover_enabled: false

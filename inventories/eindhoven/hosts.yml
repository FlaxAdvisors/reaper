---
# Cisco / Arista hosts: network_cli (libssh) bypasses ~/.ssh/config, so ProxyCommand
# is set explicitly per host. The bangs sit on the lab mgmt VLAN with direct L2 to
# the rabbits and turtle, so they are the natural jumphost — much shorter path than
# routing via a corp jumpbox. bang-gouda is the master and primary entry point;
# fall back to bang-edam if bang-gouda is unreachable.
#
# Jumphost (bang) hosts: ansible.builtin.ssh uses system SSH. ansible_host is set to
# the Tailscale IP (vault-stored) so a fresh operator without ~/.ssh/config still
# reaches the box. Matches the braintree pattern.
#
# Updated 2026-05-01: leyden retired as the corp jumpbox; all device entries now
# proxy through bang-gouda directly.
# Updated 2026-05-07: Tailscale active on both bangs; switched to ts_ip vars.
all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3
  children:
    arista:
      hosts:
        rabbit-gouda:
          ansible_host: 192.168.88.31
          ansible_ssh_extra_args: "-o ProxyCommand='ssh -W %h:%p bang-gouda'"
        rabbit-edam:
          ansible_host: 192.168.88.32
          ansible_ssh_extra_args: "-o ProxyCommand='ssh -W %h:%p bang-gouda'"
    cisco:
      hosts:
        turtle-gouda:
          ansible_host: 192.168.88.33
          ansible_ssh_extra_args: "-o ProxyCommand='ssh -W %h:%p bang-gouda'"
    jumphosts:
      hosts:
        bang-gouda:
          ansible_host: "{{ bang_gouda_ts_ip }}"
        bang-edam:
          ansible_host: "{{ bang_edam_ts_ip }}"

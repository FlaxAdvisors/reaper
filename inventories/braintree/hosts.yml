---
# Cumulus hosts: ansible.builtin.ssh uses system SSH, reads ~/.ssh/config — no extra config needed.
# Arista hosts: network_cli (libssh) bypasses ~/.ssh/config, so ProxyCommand is set explicitly.
# ansible_host is omitted — %h passes the inventory hostname to the jumphost, which resolves it locally.
all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3
  children:
    arista:
      hosts:
        rabbit-lorax:
          ansible_ssh_extra_args: "-o ProxyCommand='ssh -W %h:%p bang-fiesta'"
    cumulus:
      hosts:
        turtle-lorax:
    jumphosts:
      hosts:
        # bang-lorax DECOM 2026-05-04 — chassis faulted; replaced by bang-fiesta + bang-siesta pair.
        # bang-lorax:
        #   ansible_host: "{{ bang_lorax_ts_ip }}"
        bang-siesta:
          ansible_host: "{{ bang_siesta_ts_ip }}"
        bang-fiesta:
          ansible_host: "{{ bang_fiesta_ts_ip }}"

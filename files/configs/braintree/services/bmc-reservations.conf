# Hand-curated static DHCP reservations for this site. Repo-tracked source
# of truth — apply_bang_services deploys this file to
# /etc/dnsmasq.d/bmc-reservations.conf and triggers `restart dnsmasq`.
# (Dynamic reservations live in Kea's kea.hosts (kea mode) or the
# /etc/dnsmasq.dhcp-hosts/ dir (legacy dnsmasq mode); neither is in the repo.)
#
# Format:
#   dhcp-host=<mac>,<ip>,<hostname>,set:<tag>[,set:<tag2>...]
#
# Tags currently honoured by /etc/dnsmasq.conf:
#   set:bmc        — picks up mgmt-VLAN router/dns/domain options.
#   set:arista-ztp — Arista EOS gets option:bootfile-name pointing at
#                    {{ arista_ztp_url }} (per-site var). Apply this tag
#                    in ADDITION to set:bmc on each rabbit/turtle whose
#                    EOS should ZTP from /srv/pxe/arista-ztp.conf.
#
# OpenBMC's overlay filesystem doesn't reliably persist network config across
# reboots — wedge BMC IPs stay sticky only because dnsmasq pins them by MAC.

# NOTE: with bang_dhcp_server=kea (braintree) this whole file is NOT deployed
# (apply_bang_services removes /etc/dnsmasq.d/bmc-reservations.conf); rabbit-
# lorax-bmc is served by Kea (legacy-import reservation). Kept as the dnsmasq-
# mode fallback source only. hare-lorax-bmc removed — rabbit-hare is a DUT now.
dhcp-host=a8:2b:b5:b8:01:d4,192.168.88.13,rabbit-lorax-bmc,set:bmc
